{% load base_extras %}
{% load bcse_extras %}
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
   <head>
      <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title> BCSE</title>
      <style type="text/css">    
        :root {
           --nu-purple: #4e2a84;
           --nu-light-purple: #E4E0EE;
           --nu-mid-purple: #9380B6;
           --bcse-gray: #767676;
           --bcse-mid-gray: #cccccc;
           --bcse-light-gray: #f9f9f9;
           --bcse-error-red: #d8411d;
           --bcse-success-green: #3d7610;
           --bcse-black: #000000;
           --bcse-white: #ffffff;
           --bcse-light-yellow: #FFFFE0;
           --bcse-email-gray: #97999B;
           --baxter-kelly-green: #58AA18;
           --baxter-orange: #FA8300;
         }

         /* Portrait and Landscape */
          @media only screen and (min-width: 320px) and (max-width: 767px) {
            font-size: 10px !important;
            div#message, div#footer  {
              padding: 0.5em !important;
            }
          }

          /* ----------- tablet ----------- */
          /* Portrait and Landscape */
          @media only screen and (min-width: 768px) and (max-width: 1199px) {
            font-size: 12px !important;
            div#message, div#footer  {
              padding: 1em !important;
            }
          }

         div#email_container {
          background-color: #f1f0f0 !important;
          font-family: din-2014, sans-serif;
         }
         div#header, div#message, div#footer {
           max-width: 600px !important;
           width: 600px !important;
           margin-left: auto;
           margin-right: auto;
           background-color: white;
           border-left: 1px solid #d8d6d6;
           border-right: 1px solid #d8d6d6;
         }

         div#message, div#footer  {
           padding: 1em 2em !important;
           margin-left: auto;
           margin-right: auto;
           text-align: center;
         }

         div#footer {
          background-color: #4e2a84;
          margin-bottom: 0.5em;
         }
         div#footer h3 {
          color: white !important;
         }
         div#message {
           /*background-color: #97999B;*/
           margin-left: auto;
           margin-right: auto;
         }
         div#text {
           /*background-color: #97999B;
           color: white;*/
           font-size: 1.2em;
           line-height: 1.5em;
           padding: 2em;
           margin-left: auto;
           margin-right: auto;
         }
         td#image_banner {
           width: 100%;
           height: 5em;
           background-position: center;
           background-repeat: no-repeat;
           background-size: 100% auto;
           background-image: url(https://s3.amazonaws.com/bcse-4.0-prod/banner_logos/15thAnniversaryBanner.png);
           background-color: white;
           padding: 1em 0;
         }
         div#info div#edit, div#question div#mail {
           margin-top: 1em;
           font-style: bold;
         }
         div#header table, div#dates table, div#equipment table, div#footer table{
           width: 100%;
           margin-left: auto;
           margin-right: auto;
         }
         div#dates li {
           margin-left: 10em;
         }
         table.address {
           width: 100% !important;
         }
         table.address tr.fromto {
           font-size: 0.9em;
         }
         table.address tr.fromto td {
           vertical-align: top;
         }
         div#dates table tr td, div#equipment table tr td {
           border-top: 1px solid #767676;
           padding: 0.5em 0;
           /*color: white;*/
         }
         table tr td.left {
           border-right: 1px solid #767676;
           margin-right: 1em;
         }
         table tr td.right {
           border-left: 1px solid #767676;
           margin-left: 1em;
         }
         div#dates table tr.address {
           height: auto;
         }
         tr td.title {
           /*width: 30%;*/
           font-weight: bold;
         }
         tr td.details {
           /*width: 60%;*/
           height: auto;
         }
         tr td.details div.title {
           font-weight: 600;
         }
         div#footer table td {
           text-align: center;
         }
         div#footer table td img {
           width: 30px;
         }
         div#email_container a {
           font-weight: 600;
         }
         div#email_container ul {
          margin-bottom: unset;
         }
         div#email_container li a {
           font-weight: 400;
         }
         div#email_container h3 {
           font-weight: 600 !important;
           font-size: 1.25em !important;
           /*color: white;*/
         }

         .warning {
          text-decoration: underline;
          font-style: italic;
         }
      </style>
   </head>
   <body>
      <div id="email_container">
        {% block header %}
        <div id="header">
          <table cellspacing="0">
            <tr>
              <td id="image_banner"></td>
            </tr>
          </table>
        </div>
        {% endblock %}
        <div id="message">
           {% block emailbody %}
           {% endblock %}
        </div>
        {% block footer %}
        <div id="footer">
          <table cellspacing="0">
              <tbody>
                <tr>
                  <td colspan="5"><h3>The Baxter Center for Science Education</h3></td>
                </tr>
                <tr rowspan="3"><td colspan="5"></td></tr>
                <tr>
                  <td>
                    <a href="https://{{domain}}">
                      <img src="https://s3.amazonaws.com/bcse-4.0-prod/socialmedia/icons8-web-50.png"/>
                    </a>
                  </td>
                  <td>
                    <a href="mailto:bcse@northwestern.edu" target="_top">
                      <img src="https://s3.amazonaws.com/bcse-4.0-prod/socialmedia/icons8-mail-50.png"/>
                    </a>
                  </td>
                  <td>
                    <a href="https://{{domain}}/subscribe">
                      <img src="https://s3.amazonaws.com/bcse-4.0-prod/socialmedia/icons8-inbox-50.png"/>
                    </a>
                  </td>
                  <td>
                    <a href="https://maps.app.goo.gl/WEHyQyfEQTHK6x2xA" target="_blank">
                      <img src="https://s3.amazonaws.com/bcse-4.0-prod/socialmedia/icons8-location-50.png"/>
                    </a>
                  </td>
                  <td>
                    <a href="https://www.instagram.com/bcse_nu" target="_blank">
                      <img src="https://s3.amazonaws.com/bcse-4.0-prod/socialmedia/icons8-instagram-50.png"/>
                    </a>
                  </td>
                </tr>
              </tbody>
            </table>

        </div>
        {% endblock %}
      </div>
   </body>
</html>
